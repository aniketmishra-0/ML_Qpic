name: qpic_desktop
description: "Qpic native desktop client (macOS + Windows) for the Qpic FastAPI engine."
# Prevents accidental publishing to pub.dev — this is an application, not a package.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client used by ApiClient to talk to the localhost sidecar engine.
  dio: ^5.7.0
  # Native open / save-as dialogs (macOS + Windows).
  file_selector: ^1.0.3
  # Drag-and-drop file targets for the tool zones.
  desktop_drop: ^0.5.0
  # Desktop window lifecycle / close-intercept handling.
  window_manager: ^0.4.3
  # Persists theme-mode and other lightweight settings.
  shared_preferences: ^2.3.3
  # Path joining utilities (cross-platform).
  path: ^1.9.0
  # Per-OS writable application-support / temp directory resolution.
  path_provider: ^2.1.5
  # Opens external links (the "Built by" credit's LinkedIn profile) in the
  # user's default browser on macOS + Windows.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Recommended Flutter lint rule set; configured via analysis_options.yaml.
  flutter_lints: ^5.0.0
  # Windows installer generation (MSIX, the default installer for Req 21.2).
  # Used by packaging/windows/build_windows.ps1 via `dart run msix:create`.
  msix: ^3.16.7

flutter:
  uses-material-design: true

# MSIX installer configuration consumed by `dart run msix:create`
# (packaging/windows/build_windows.ps1). The runner output already contains the
# embedded `sidecar\` folder (engine + bundled Tesseract) at package time, so
# msix bundles it verbatim and lib/core/paths.dart resolves it at runtime
# (Req 21.2, 21.3). Certificate options are supplied on the command line from
# WIN_CERT_PATH / WIN_CERT_PASSWORD, so none are hard-coded here — absent =>
# unsigned build (Req 21.7).
msix_config:
  display_name: Qpic
  publisher_display_name: Qpic
  identity_name: com.qpic.desktop
  msix_version: 1.0.0.0
  # Loopback only: the app talks to its localhost sidecar over 127.0.0.1.
  capabilities: ""
